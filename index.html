<body onclick="autoPlayMusic()" ontouchstart="autoPlayMusic()">
    <!-- ... existing code ... -->
    <script>
        const bgMusic = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('musicIcon');
        let isPlaying = false;
        let hasInteracted = false;

        function autoPlayMusic() {
            if (!hasInteracted) {
                // 手機瀏覽器需要先 load 再 play
                bgMusic.load(); 
                const playPromise = bgMusic.play();

                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        isPlaying = true;
                        musicIcon.classList.add('rotating');
                        hasInteracted = true;
                        console.log("Music started successfully");
                    }).catch(error => {
                        console.log("Autoplay blocked, waiting for user toggle:", error);
                    });
                }
            }
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (isPlaying) {
                bgMusic.pause();
                musicIcon.classList.remove('rotating');
            } else {
                bgMusic.play();
                musicIcon.classList.add('rotating');
            }
            isPlaying = !isPlaying;
            hasInteracted = true; 
        }
