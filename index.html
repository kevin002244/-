<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>彥瑋 ♥ 佳琪 婚禮邀請函</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.1.0/style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --rose-gold: #fdf1f0;
            --rose-accent: #f4d0cb;
            --gold-dark: #d4a373;
        }
        body {
            font-family: 'Noto Serif TC', serif;
            background: linear-gradient(135deg, #fdf1f0 0%, #f4d0cb 50%, #eae2d6 100%);
            background-attachment: fixed;
            color: #5a4a4a;
            scroll-behavior: smooth;
        }
        .font-lxgw { font-family: 'LXGW WenKai Lite', sans-serif; }
        .font-handwriting { font-family: 'Ma Shan Zheng', cursive; }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
        }
        .heart-pulse { display: inline-block; color: #e5989b; animation: heartbeat 1.5s infinite ease-in-out; }

        /* 封面高度固定，不跑版 */
        .cover-section {
            height: 78vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }
        .cover-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 80% center; 
            z-index: 0;
        }
        .cover-content {
            position: relative;
            z-index: 10;
            padding: 2.5rem 1.5rem;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
        }

        /* 防止手機縮放跑版：強制 16px */
        select, input, textarea {
            background: transparent !important;
            border-bottom: 1px solid #f4d0cb !important;
            border-radius: 0 !important;
            outline: none !important;
            font-size: 16px !important; 
            width: 100%;
        }
        
        .form-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 4px solid #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-radius: 2.5rem;
        }
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full z-50 px-5 py-3 flex justify-between items-center bg-white/70 backdrop-blur-md border-b border-rose-100">
        <div class="text-xl text-[#d4a373] font-lxgw font-bold">彥瑋 ♥ 佳琪</div>
        <div class="space-x-4 text-[10px] font-bold tracking-widest text-[#a68a8a]">
            <a href="#location">地點</a>
            <a href="#rsvp" class="text-[#d4a373] border-b-2 border-[#f4d0cb]">出席回函</a>
        </div>
    </nav>

    <section class="cover-section">
        <img src="https://i.postimg.cc/vT1DdyBP/IMG-2440.jpg" alt="婚禮照片" class="cover-img">
        <div class="cover-content text-white">
            <p class="font-handwriting text-2xl mb-1">Truly, Madly, Deeply</p>
            <h1 class="text-5xl font-bold tracking-tighter mb-4 font-lxgw">彥瑋 <span class="heart-pulse">♥</span> 佳琪</h1>
            <p class="text-xs tracking-[0.4em] uppercase">2026 . 07 . 19</p>
        </div>
    </section>

    <section id="details" class="py-12 px-6 text-center">
        <div class="flex justify-center gap-4">
            <div class="bg-white rounded-2xl p-4 min-w-[75px] shadow-sm"><span id="days" class="text-2xl font-bold text-[#d4a373]">00</span><br><span class="text-[9px]">DAYS</span></div>
            <div class="bg-white rounded-2xl p-4 min-w-[75px] shadow-sm"><span id="hours" class="text-2xl font-bold text-[#d4a373]">00</span><br><span class="text-[9px]">HOURS</span></div>
            <div class="bg-white rounded-2xl p-4 min-w-[75px] shadow-sm"><span id="minutes" class="text-2xl font-bold text-[#d4a373]">00</span><br><span class="text-[9px]">MINS</span></div>
        </div>
    </section>

    <section id="location" class="py-10 px-6">
        <div class="max-w-md mx-auto space-y-6">
            <div class="bg-white/70 p-8 rounded-[2rem] border-l-8 border-[#d4a373] shadow-sm">
                <h3 class="text-[#d4a373] text-[10px] font-bold mb-2 tracking-widest uppercase">Wedding Venue</h3>
                <p class="text-2xl font-bold mb-1">台中李方艾美酒店</p>
                <p class="text-[#8a7a7a] text-sm">台中市中區建國路111號</p>
                <a href="https://maps.app.goo.gl/oYxX8rS5zX6" target="_blank" class="inline-block mt-4 text-[#d4a373] text-xs font-bold border-b border-[#d4a373]">開啟導航查看 ➔</a>
            </div>
            <div class="rounded-3xl overflow-hidden shadow-lg">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3640.898!2d120.682137!3d24.13784!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x34693d1421043f11%3A0xc38d8794c4897282!2z5Y-w5Lit5p2O5pa56Im-576O6YWS5bqX!5e0!3m2!1szh-TW!2stw!4v1715000000000" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </section>

    <section id="rsvp" class="py-10 px-4 pb-32">
        <div class="max-w-md mx-auto form-card p-8">
            <div class="text-center mb-10">
                <p class="font-handwriting text-2xl text-[#e5989b] mb-1">Welcome to our wedding</p>
                <h2 class="text-xl font-bold tracking-widest text-[#5a4a4a]">出席回函 RSVP</h2>
            </div>

            <!-- 關鍵：hidden_iframe 用於接收送出後的跳轉，防止頁面跑掉 -->
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){showSuccess();}"></iframe>
            
            <form action="https://docs.google.com/forms/d/e/1FAIpQLSdZh8EyIsnV1SeeKx09DcRc04ITOYqYs1obArwVwweRXtv-0g/formResponse" method="post" target="hidden_iframe" id="weddingForm" onsubmit="return handleFormSubmit()">
                
                <!-- 姓名 (1482369712) -->
                <div class="mb-6">
                    <label class="block text-[10px] font-bold text-[#b4a4a4] mb-1 uppercase tracking-widest">您的姓名 Name</label>
                    <input type="text" name="entry.1482369712" required>
                </div>

                <!-- 聯絡電話 (852634498) -->
                <div class="mb-6">
                    <label class="block text-[10px] font-bold text-[#b4a4a4] mb-1 uppercase tracking-widest">聯絡電話 Phone</label>
                    <input type="tel" name="entry.852634498" required placeholder="請輸入電話">
                </div>

                <!-- 關係 (1431945946) -->
                <div class="mb-6">
                    <label class="block text-[10px] font-bold text-[#b4a4a4] mb-1 uppercase tracking-widest">關係 Relationship</label>
                    <select id="rel_select">
                        <option value="新郎親友">新郎親友</option>
                        <option value="新娘親友">新娘親友</option>
                        <option value="other">其他 (手寫)...</option>
                    </select>
                    <input type="text" id="rel_other" placeholder="請填寫關係" class="mt-2 hidden">
                    <!-- 這是真正傳送到後台的隱藏欄位 -->
                    <input type="hidden" name="entry.1431945946" id="real_rel">
                </div>

                <!-- 出席意願 (1161041930) -->
                <div class="mb-6">
                    <label class="block text-[10px] font-bold text-[#b4a4a4] mb-1 uppercase tracking-widest">出席意願 Attendance</label>
                    <select id="att_select" name="entry.1161041930" required>
                        <option value="是，我會準時出席">是，我會準時出席</option>
                        <option value="否，無法出席，祝福你們">否，無法出席，祝福你們</option>
                    </select>
                </div>

                <div id="attending_fields">
                    <!-- 總人數 (982880244) -->
                    <div class="mb-6">
                        <label class="block text-[10px] font-bold text-[#b4a4a4] mb-1 uppercase tracking-widest">出席總人數 Total Guests</label>
                        <select name="entry.982880244">
                            <script>for(let i=1;i<=10;i++) document.write(`<option value="${i}">${i} 位</option>`)</script>
                        </select>
                    </div>

                    <!-- 葷素小孩椅網格 (不跑版強化) -->
                    <div class="mb-6">
                        <label class="block text-[10px] font-bold text-[#b4a4a4] mb-2 text-center uppercase">餐點與需求詳情</label>
                        <div class="grid grid-cols-3 gap-2 bg-white/50 p-4 rounded-2xl border border-rose-100">
                            <div class="text-center">
                                <label class="text-[9px] text-[#d4a373] font-bold block mb-1">葷食</label>
                                <select name="entry.2042930033"><script>for(let i=0;i<=10;i++) document.write(`<option value="${i}">${i}</option>`)</script></select>
                            </div>
                            <div class="text-center border-x border-rose-100">
                                <label class="text-[9px] text-[#d4a373] font-bold block mb-1">素食</label>
                                <select name="entry.348747956"><script>for(let i=0;i<=10;i++) document.write(`<option value="${i}">${i}</option>`)</script></select>
                            </div>
                            <div class="text-center">
                                <label class="text-[9px] text-[#d4a373] font-bold block mb-1">小孩椅</label>
                                <select name="entry.984101902"><script>for(let i=0;i<=5;i++) document.write(`<option value="${i}">${i}</option>`)</script></select>
                            </div>
                        </div>
                    </div>

                    <!-- 特殊需求 (1464732811) -->
                    <div class="mb-6">
                        <label class="block text-[10px] font-bold text-[#b4a4a4] mb-1 uppercase tracking-widest">特殊需求 (如過敏/不吃牛)</label>
                        <input type="text" name="entry.1464732811" placeholder="如：不吃牛、海鮮過敏">
                    </div>
                </div>

                <!-- 悄悄話 (572273114) -->
                <div class="mb-8">
                    <label class="block text-[10px] font-bold text-[#b4a4a4] mb-1 uppercase tracking-widest">給我們的悄悄話</label>
                    <textarea name="entry.572273114" rows="2" class="italic"></textarea>
                </div>

                <button type="submit" class="w-full py-4 text-white font-bold tracking-[0.4em] shadow-xl bg-gradient-to-r from-[#d4a373] to-[#e5989b] rounded-2xl active:scale-95 transition-all">送出祝福</button>
            </form>

            <div id="success-msg" class="hidden text-center py-12">
                <div class="heart-pulse text-5xl mb-6">♥</div>
                <h3 class="text-xl font-bold text-[#d4a373]">回函已送出</h3>
                <p class="text-xs text-[#a68a8a] mt-2 italic">期待現場與您分享喜悅！</p>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-[#c4b4b4] text-[9px] tracking-[0.5em] uppercase font-lxgw">
        Yan Wei & Chia Chi 2026.07.19
    </footer>

    <script>
        const targetDate = new Date("July 19, 2026 11:30:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const dist = targetDate - now;
            if (dist > 0) {
                document.getElementById("days").innerText = Math.floor(dist / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById("hours").innerText = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                document.getElementById("minutes").innerText = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            }
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        const attSelect = document.getElementById('att_select');
        const attFields = document.getElementById('attending_fields');
        const relSelect = document.getElementById('rel_select');
        const relOther = document.getElementById('rel_other');

        attSelect.onchange = () => attFields.style.display = (attSelect.value.includes('否')) ? 'none' : 'block';
        relSelect.onchange = () => relOther.classList.toggle('hidden', relSelect.value !== 'other');

        let submitted = false;
        function handleFormSubmit() {
            // 提交前強制把關係值寫入隱藏欄位
            const realRelInput = document.getElementById('real_rel');
            realRelInput.value = (relSelect.value === 'other') ? relOther.value : relSelect.value;
            
            submitted = true;
            return true; 
        }

        function showSuccess() {
            document.getElementById('weddingForm').style.display = 'none';
            document.getElementById('success-msg').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('rsvp').offsetTop - 50, behavior: 'smooth' });
        }
    </script>
</body>
</html>
